services:
  nominatim:
    image: ${NOMINATIM_IMAGE:-mediagis/nominatim:5.3.2}
    container_name: lumamemo_nominatim
    restart: unless-stopped
    expose:
      - '8080'
    environment:
      PBF_URL: ${NOMINATIM_PBF_URL:-}
      REPLICATION_URL: ${NOMINATIM_REPLICATION_URL:-}
      NOMINATIM_PASSWORD: ${NOMINATIM_PASSWORD:-lumamemo-nominatim-password}
      IMPORT_STYLE: ${NOMINATIM_IMPORT_STYLE:-admin}
      THREADS: ${NOMINATIM_THREADS:-4}
      HTTPS_PROXY: ''
      HTTP_PROXY: ''
      ALL_PROXY: ''
      https_proxy: ''
      http_proxy: ''
      all_proxy: ''
      NO_PROXY: '*'
      no_proxy: '*'
    shm_size: ${NOMINATIM_SHM_SIZE:-1gb}
    volumes:
      - ./data/middleware/nominatim:/var/lib/postgresql/16/main

  pmtiles:
    image: ${PMTILES_IMAGE:-protomaps/go-pmtiles:latest}
    container_name: lumamemo_pmtiles
    restart: unless-stopped
    command:
      - serve
      - /data
      - --port=8080
      - --cors=*
      - --public-url=http://localhost:${GATEWAY_PORT:-3000}/tiles
    expose:
      - '8080'
    volumes:
      - ./data/middleware/pmtiles:/data:ro
    environment:
      HTTPS_PROXY: ''
      HTTP_PROXY: ''
      ALL_PROXY: ''
      https_proxy: ''
      http_proxy: ''
      all_proxy: ''
      NO_PROXY: '*'
      no_proxy: '*'

  maplibre:
    image: ${MAPLIBRE_IMAGE:-nginx:alpine}
    container_name: lumamemo_maplibre
    restart: unless-stopped
    expose:
      - '80'
    volumes:
      - ./data/middleware/maplibre/public:/usr/share/nginx/html:ro

  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:v1.18.2}
    container_name: lumamemo_qdrant
    restart: unless-stopped
    expose:
      - '6333'
    volumes:
      - ./data/middleware/qdrant:/qdrant/storage
