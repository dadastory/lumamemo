name: Update Star History

on:
  schedule:
    - cron: '20 2 * * 1'
  watch:
    types: [started]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: star-history
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Render Star History for English README
        uses: narayann7/star-history-action@v1
        with:
          repos: ${{ github.repository }}
          readme: README.md
          output-dir: assets/star-history
          commit: false

      - name: Render Star History for Chinese README
        uses: narayann7/star-history-action@v1
        with:
          repos: ${{ github.repository }}
          readme: README_zh.md
          output-dir: assets/star-history
          commit: false

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/update-star-history
          delete-branch: true
          title: 'chore: update star history'
          commit-message: 'chore: update star history'
          body: 'Automated Star History refresh generated by narayann7/star-history-action.'
          labels: documentation, automated
