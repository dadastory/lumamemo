name: Publish Latest Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-latest
  cancel-in-progress: true

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_USERNAME: dadastory
  DOCKERHUB_IMAGE_NAME: dadastory/${{ github.event.repository.name }}
  TARGET_ARCHITECTURES: amd64 arm64

jobs:
  build-and-push:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build Docker image (${{ matrix.arch }})
        run: |
          set -euo pipefail
          GHCR_BASE_RAW="${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}"
          DOCKERHUB_BASE_RAW="${{ env.DOCKERHUB_IMAGE_NAME }}"
          GHCR_BASE=$(echo "$GHCR_BASE_RAW" | tr '[:upper:]' '[:lower:]')
          DOCKERHUB_BASE=$(echo "$DOCKERHUB_BASE_RAW" | tr '[:upper:]' '[:lower:]')
          PUBLISH_DOCKERHUB=false
          if [ -n "${DOCKERHUB_TOKEN:-}" ]; then
            PUBLISH_DOCKERHUB=true
          fi
          ARCH="${{ matrix.arch }}"
          SHA_TAG="sha-$(git rev-parse --short HEAD)"

          docker build \
            --tag "${GHCR_BASE}:latest-${ARCH}" \
            .

          docker tag "${GHCR_BASE}:latest-${ARCH}" "${GHCR_BASE}:${SHA_TAG}-${ARCH}"

          for tag in "${GHCR_BASE}:latest-${ARCH}" "${GHCR_BASE}:${SHA_TAG}-${ARCH}"; do
            docker push "$tag"
          done

          if [ "$PUBLISH_DOCKERHUB" = "true" ]; then
            docker tag "${GHCR_BASE}:latest-${ARCH}" "${DOCKERHUB_BASE}:latest-${ARCH}"
            docker tag "${GHCR_BASE}:latest-${ARCH}" "${DOCKERHUB_BASE}:${SHA_TAG}-${ARCH}"

            for tag in "${DOCKERHUB_BASE}:latest-${ARCH}" "${DOCKERHUB_BASE}:${SHA_TAG}-${ARCH}"; do
              docker push "$tag"
            done
          fi

  manifest:
    needs: build-and-push
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Publish multi-architecture manifests
        run: |
          set -euo pipefail
          GHCR_BASE_RAW="${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}"
          DOCKERHUB_BASE_RAW="${{ env.DOCKERHUB_IMAGE_NAME }}"
          GHCR_BASE=$(echo "$GHCR_BASE_RAW" | tr '[:upper:]' '[:lower:]')
          DOCKERHUB_BASE=$(echo "$DOCKERHUB_BASE_RAW" | tr '[:upper:]' '[:lower:]')
          PUBLISH_DOCKERHUB=false
          if [ -n "${DOCKERHUB_TOKEN:-}" ]; then
            PUBLISH_DOCKERHUB=true
          fi
          ARCHITECTURES=( $TARGET_ARCHITECTURES )
          SHA_TAG="sha-$(git rev-parse --short HEAD)"

          create_and_push_manifest() {
            local registry_base=$1
            local tag=$2
            local refs=()
            for arch in "${ARCHITECTURES[@]}"; do
              refs+=("${registry_base}:${tag}-${arch}")
            done
            if docker manifest inspect "${registry_base}:${tag}" > /dev/null 2>&1; then
              docker manifest create --amend "${registry_base}:${tag}" "${refs[@]}"
            else
              docker manifest create "${registry_base}:${tag}" "${refs[@]}"
            fi
            docker manifest push "${registry_base}:${tag}"
          }

          create_and_push_manifest "${GHCR_BASE}" "latest"
          create_and_push_manifest "${GHCR_BASE}" "${SHA_TAG}"

          if [ "$PUBLISH_DOCKERHUB" = "true" ]; then
            create_and_push_manifest "${DOCKERHUB_BASE}" "latest"
            create_and_push_manifest "${DOCKERHUB_BASE}" "${SHA_TAG}"
          fi

      - name: Generate summary
        run: |
          set -euo pipefail
          GHCR_BASE=$(echo "${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          DOCKERHUB_BASE=$(echo "${{ env.DOCKERHUB_IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          SHA_TAG="sha-$(git rev-parse --short HEAD)"

          echo "## Docker latest tags published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Source ref:** \`${GITHUB_REF#refs/heads/}\` @ \`${SHA_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### GitHub Container Registry" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${GHCR_BASE}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${GHCR_BASE}:${SHA_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${DOCKERHUB_TOKEN:-}" ]; then
            echo "### Docker Hub" >> "$GITHUB_STEP_SUMMARY"
            echo "- \`${DOCKERHUB_BASE}:latest\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- \`${DOCKERHUB_BASE}:${SHA_TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Platforms:** \`linux/amd64\`, \`linux/arm64\`" >> "$GITHUB_STEP_SUMMARY"
