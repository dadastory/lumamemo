include:
  - path: third-party/middleware/docker-compose.yml
    project_directory: .
  - path: third-party/ai/docker-compose.yml
    project_directory: .

services:
  chronoframe:
    image: ${CFRAME_IMAGE:-chronoframe:latest}
    container_name: chronoframe
    restart: unless-stopped
    expose:
      - '3000'
    volumes:
      - ./data/app:/app/data
      - ./data/storage:/app/data/storage
      - ./data/ai/localai/models:/app/data/ai/localai/models
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      nominatim:
        condition: service_started
      chronoframe-localai:
        condition: service_started
      chronoframe-qdrant:
        condition: service_started

  gateway:
    image: ${GATEWAY_IMAGE:-nginx:alpine}
    container_name: chronoframe_gateway
    restart: unless-stopped
    ports:
      - '${GATEWAY_PORT:-3000}:80'
    volumes:
      - ./third-party/middleware/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      chronoframe:
        condition: service_started
      nominatim:
        condition: service_started
